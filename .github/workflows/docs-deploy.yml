name: Docs deploy (fallback)

# Fallback only. The primary deploy is Cloudflare Pages' Git integration (builds on push to main).
# This workflow is manual-only so it never auto-runs / consumes minutes; use it only if the CF build
# breaks on the ONNX search step. Requires secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build + wrangler pages deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the git plugin (edit links / last-updated)
      - uses: actions/setup-node@v4
        with:
          node-version-file: docs-site/.node-version
      - name: Install
        run: npm ci
      - name: Guard
        run: npm run check
      - name: Build
        run: npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages deploy _site --project-name=laravel-invitations --branch=main
